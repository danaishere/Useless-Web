<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hungry Frog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splashScreen">
        <h1 id="splashTitle">🐸 HUNGRY FROG 🐸</h1>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" style="display: none;">
        <div class="game-container">
            <h1 class="title">🐸 HUNGRY FROG 🐸</h1>
            <p class="subtitle">Feed your stress to the frog!</p>
            
            <div class="frog-container">
                <!-- Main frog image -->
                <img id="frogImage" src="img/Frog-default.png" alt="Frog" class="frog constantly-jiggling">
                
                <!-- Crown accessory -->
                <div id="frogCrown" class="frog-crown hidden">
                    <img src="img/Acc-crown.png" alt="Crown" class="crown-image"> 

                </div>
                
                <!-- Sword accessory -->
                <div id="frogSword" class="frog-sword hidden">
                    <img src="img/Acc-sword.png" alt="Sword" class="sword-image">
                </div>
            </div>
            
            <div class="input-container">
                <textarea id="stressInput" placeholder="What's stressing you out today?"></textarea>
                <button id="feedButton" onclick="feedFrog()">FEED THE FROG</button>
            </div>
            
            <div id="feedCounter" class="counter">You've fed the frog 0 times</div>
            
            <div class="evolution-status">
                <div id="swordStatus" class="accessory-status">🗡️ Sword: Feed 3 times</div>
                <div id="crownStatus" class="accessory-status">👑 Crown: Feed 5 times</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
